<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Trader Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: #0d1117;
      color: #b8c4ce;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }
    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-brand .brand-icon {
      width: 48px; height: 48px;
      background: rgba(56,139,253,.12);
      border: 1px solid rgba(56,139,253,.3);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      color: #388bfd;
      margin: 0 auto 12px;
    }
    .login-brand .brand-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      color: #e6edf3;
      letter-spacing: .5px;
    }
    .login-brand .brand-sub {
      font-size: 11px;
      color: #7d8590;
      font-family: 'JetBrains Mono', monospace;
    }
    .form-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: #7d8590;
      margin-bottom: 5px;
    }
    .form-control {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #b8c4ce;
      border-radius: 7px;
      font-size: 13px;
      padding: 8px 12px;
    }
    .form-control:focus {
      background: #0d1117;
      border-color: #388bfd;
      box-shadow: 0 0 0 3px rgba(56,139,253,.15);
      color: #e6edf3;
    }
    .btn-login {
      background: #388bfd;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: .85; }
    .error-msg {
      background: rgba(224,92,92,.1);
      border: 1px solid rgba(224,92,92,.3);
      color: #e05c5c;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 12px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-brand">
    <div class="brand-icon"><i class="bi bi-graph-up-arrow"></i></div>
    <div class="brand-name">TRADER</div>
    <div class="brand-sub">B3 · Dashboard</div>
  </div>

  {% if form.errors %}
  <div class="error-msg">
    <i class="bi bi-exclamation-circle me-1"></i>
    Usuário ou senha incorretos. Tente novamente.
  </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">

    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <input type="text" name="username" class="form-control"
             autofocus autocomplete="username" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Senha</label>
      <input type="password" name="password" class="form-control"
             autocomplete="current-password" required>
    </div>

    <button type="submit" class="btn-login">
      <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
    </button>
  </form>
</div>

</body>
</html>
